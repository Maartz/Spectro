name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build
        run: swift build

      - name: Build tests
        run: swift build --build-tests

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spectro_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        env:
          DB_HOST: postgres
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: postgres
          TEST_DB_NAME: spectro_test
        run: swift test
